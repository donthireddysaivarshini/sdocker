# ============================================================
# Saanidhyam - Docker Compose (Cron version — no Celery/Redis)
# Orchestrates backend (Django) + frontend (Nginx) containers
# ============================================================

services:

  # --- Django Backend (API + Management Commands) ---
  backend:
    build:
      context: ./saanidhyambackend
      dockerfile: Dockerfile
    container_name: saanidhyam-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - ./saanidhyambackend/.env
    environment:
      - DJANGO_ENV=development
      - ALLOWED_HOSTS=localhost,127.0.0.1,backend,*
      - CORS_ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,http://localhost:80,http://localhost
    volumes:
      - backend_media:/app/media
    networks:
      - saanidhyam-network

  # --- React Frontend (Nginx) ---
  frontend:
    build:
      context: ./saanidhyamfrontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: saanidhyam-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - saanidhyam-network

# REMOVED: redis, celery_worker, celery_beat

volumes:
  backend_media:

networks:
  saanidhyam-network:
    driver: bridge